<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
  }
  h1 {
    font-size: 2rem;
    letter-spacing: 3px;
    color: #e94560;
  }
  .games {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  a.card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    width: 180px;
    height: 140px;
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 14px;
    text-decoration: none;
    color: #a8dadc;
    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 1px;
    transition: border-color 0.2s, transform 0.15s;
  }
  a.card:hover {
    border-color: #e94560;
    transform: translateY(-4px);
    color: #fff;
  }
  .icon { font-size: 2.8rem; }
</style>
</head>
<body>
  <h1>GAMES</h1>
  <div class="games">
    <a class="card" href="/tictactoe.html">
      <span class="icon">✕○</span>
      Tic-Tac-Toe
    </a>
    <a class="card" href="/shooter.html">
      <span class="icon">🎯</span>
      Shooter
    </a>
  </div>
</body>
</html>
