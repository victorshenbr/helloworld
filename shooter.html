<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- State ---
let player, bullets, enemies, score, wave, gameOver;
let keys = {};
let mouse = { x: 0, y: 0, down: false };
let lastShot = 0;
let spawnTimer = 0;
let spawnInterval = 1500; // ms between spawns
let invincibleUntil = 0;
let lastTime = 0;

const PLAYER_SPEED = 220;
const BULLET_SPEED = 500;
const FIRE_RATE = 150;
const ENEMY_BASE_SPEED = 90;
const PLAYER_RADIUS = 14;
const BULLET_RADIUS = 5;
const ENEMY_RADIUS = 16;
const ENEMY_HP = 1;
const PLAYER_MAX_HP = 100;
const DAMAGE = 10;
const INVINCIBLE_MS = 1000;

function initGame() {
  player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    hp: PLAYER_MAX_HP,
    maxHp: PLAYER_MAX_HP,
    radius: PLAYER_RADIUS,
    angle: 0,
  };
  bullets = [];
  enemies = [];
  score = 0;
  wave = 1;
  gameOver = false;
  spawnTimer = 0;
  spawnInterval = 1500;
  invincibleUntil = 0;
  lastTime = performance.now();
}

// --- Input ---
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// --- Helpers ---
function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function spawnEnemy() {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  const w = canvas.width, h = canvas.height;
  if (side === 0) { x = Math.random() * w; y = -ENEMY_RADIUS; }
  else if (side === 1) { x = w + ENEMY_RADIUS; y = Math.random() * h; }
  else if (side === 2) { x = Math.random() * w; y = h + ENEMY_RADIUS; }
  else { x = -ENEMY_RADIUS; y = Math.random() * h; }

  const speed = ENEMY_BASE_SPEED + (wave - 1) * 12;
  enemies.push({ x, y, radius: ENEMY_RADIUS, hp: ENEMY_HP, speed });
}

function shoot(now) {
  if (now - lastShot < FIRE_RATE) return;
  lastShot = now;
  const dx = mouse.x - player.x;
  const dy = mouse.y - player.y;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  bullets.push({
    x: player.x,
    y: player.y,
    vx: (dx / len) * BULLET_SPEED,
    vy: (dy / len) * BULLET_SPEED,
    radius: BULLET_RADIUS,
  });
}

// --- Update ---
function update(dt, now) {
  // Move player
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup'])    dy -= 1;
  if (keys['s'] || keys['arrowdown'])  dy += 1;
  if (keys['a'] || keys['arrowleft'])  dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  if (dx !== 0 || dy !== 0) {
    player.x += (dx / len) * PLAYER_SPEED * dt;
    player.y += (dy / len) * PLAYER_SPEED * dt;
  }
  // Clamp to canvas
  player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
  player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
  // Aim
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  // Shoot
  if (mouse.down) shoot(now);

  // Move bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -20 || b.x > canvas.width + 20 || b.y < -20 || b.y > canvas.height + 20) {
      bullets.splice(i, 1);
    }
  }

  // Spawn enemies
  spawnTimer += dt * 1000;
  while (spawnTimer >= spawnInterval) {
    spawnTimer -= spawnInterval;
    const count = 1 + Math.floor(wave / 3);
    for (let i = 0; i < count; i++) spawnEnemy();
  }

  // Move enemies toward player
  for (const e of enemies) {
    const ex = player.x - e.x, ey = player.y - e.y;
    const el = Math.sqrt(ex * ex + ey * ey) || 1;
    e.x += (ex / el) * e.speed * dt;
    e.y += (ey / el) * e.speed * dt;
  }

  // Bullet-enemy collisions
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      if (dist(bullets[bi], enemies[ei]) < bullets[bi].radius + enemies[ei].radius) {
        enemies[ei].hp--;
        bullets.splice(bi, 1);
        if (enemies[ei].hp <= 0) {
          enemies.splice(ei, 1);
          score++;
          // Difficulty scaling every 10 kills
          wave = 1 + Math.floor(score / 10);
          spawnInterval = Math.max(400, 1500 - (wave - 1) * 80);
        }
        break;
      }
    }
  }

  // Enemy-player collisions
  if (now >= invincibleUntil) {
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      if (dist(player, enemies[ei]) < player.radius + enemies[ei].radius) {
        player.hp -= DAMAGE;
        invincibleUntil = now + INVINCIBLE_MS;
        if (player.hp <= 0) {
          player.hp = 0;
          gameOver = true;
        }
        break;
      }
    }
  }
}

// --- Render ---
function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);

  // Body circle
  ctx.beginPath();
  ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
  ctx.fillStyle = '#a8dadc';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Direction indicator (gun barrel)
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(player.radius + 8, 0);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.restore();
}

function drawEnemies() {
  for (const e of enemies) {
    ctx.save();
    ctx.translate(e.x, e.y);
    // Triangle enemy
    ctx.beginPath();
    ctx.moveTo(0, -e.radius);
    ctx.lineTo(e.radius * 0.87, e.radius * 0.5);
    ctx.lineTo(-e.radius * 0.87, e.radius * 0.5);
    ctx.closePath();
    ctx.fillStyle = '#e94560';
    ctx.fill();
    ctx.strokeStyle = '#ff8fa3';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }
}

function drawBullets() {
  ctx.fillStyle = '#ffd700';
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHUD() {
  const hpRatio = player.hp / player.maxHp;

  // Health bar background
  const barW = 200, barH = 18, barX = 20, barY = 20;
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);

  // Health bar fill (green → yellow → red)
  const r = Math.round(255 * (1 - hpRatio));
  const g = Math.round(255 * hpRatio);
  ctx.fillStyle = `rgb(${r},${g},0)`;
  ctx.fillRect(barX, barY, barW * hpRatio, barH);

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(barX, barY, barW, barH);

  ctx.fillStyle = '#eee';
  ctx.font = '13px monospace';
  ctx.fillText(`HP  ${player.hp} / ${player.maxHp}`, barX + 4, barY + 13);

  // Score
  ctx.fillStyle = '#eee';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`SCORE  ${score}`, canvas.width - 20, 38);
  ctx.textAlign = 'center';

  // Wave
  ctx.fillStyle = '#eee';
  ctx.font = '16px monospace';
  ctx.fillText(`WAVE ${wave}`, canvas.width / 2, 38);

  ctx.textAlign = 'left';
}

function drawGameOver() {
  // Overlay
  ctx.fillStyle = 'rgba(10,10,20,0.78)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2, cy = canvas.height / 2;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 56px monospace';
  ctx.fillText('GAME OVER', cx, cy - 60);

  ctx.fillStyle = '#eee';
  ctx.font = '28px monospace';
  ctx.fillText(`Final Score: ${score}`, cx, cy);
  ctx.fillText(`Wave: ${wave}`, cx, cy + 40);

  // Button
  const bw = 200, bh = 50, bx = cx - bw / 2, by = cy + 80;
  ctx.fillStyle = '#a8dadc';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 8);
  ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('Play Again', cx, by + 33);

  ctx.textAlign = 'left';

  // Store button rect for click detection
  drawGameOver._btn = { x: bx, y: by, w: bw, h: bh };
}

canvas.addEventListener('click', e => {
  if (!gameOver) return;
  const btn = drawGameOver._btn;
  if (btn && e.clientX >= btn.x && e.clientX <= btn.x + btn.w &&
      e.clientY >= btn.y && e.clientY <= btn.y + btn.h) {
    initGame();
  }
});

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawBullets();
  drawEnemies();
  drawPlayer();
  drawHUD();

  if (gameOver) drawGameOver();
}

// --- Loop ---
function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  if (!gameOver) update(dt, now);
  render();

  requestAnimationFrame(loop);
}

initGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
